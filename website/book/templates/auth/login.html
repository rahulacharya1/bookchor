{% extends "auth/auth_base.html" %}
{% load crispy_forms_tags %}

{% block content %}
<div class="max-w-2xl mx-auto h-[81vh] flex flex-col justify-center">
    <div class="mb-6">
        <a href="{% url 'home' %}" class="text-sm text-purple-700 hover:underline font-medium">
            ← Back to Home
        </a>
    </div>

    <div class="bg-white border border-slate-200 shadow-sm">
        <div class="p-6 border-b border-slate-200">
            <h2 class="font-bold text-xl text-slate-800">Log In to Your Account</h2>
        </div>
        
        <div class="p-8">
            <form action="" method="post" enctype="multipart/form-data">
                {% csrf_token %}
                
                <div class="space-y-4">
                    {{form|crispy}}
                </div>

                <button type="submit" class="mt-5 w-full bg-purple-700 hover:bg-purple-800 text-white font-semibold py-3 rounded-sm transition">
                    Log In
                </button>
            </form>
        </div>
    </div>
</div>
{% endblock  %}
