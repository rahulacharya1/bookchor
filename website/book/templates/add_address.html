{% extends "base.html" %}
{% load crispy_forms_tags %}

{% block content %}
<div class="max-w-2xl mx-auto py-10">
    <div class="bg-white border border-slate-200 shadow-sm">
        <div class="p-6 border-b border-slate-200">
            <h2 class="font-bold text-xl text-slate-800">Insert New Address</h2>
            <p class="text-sm text-slate-500">Add a new address to the BookChor database.</p>
        </div>
        
        <div class="p-8">
            <form action="" method="post" enctype="multipart/form-data">
                {% csrf_token %}
                
                <div class="space-y-4">
                    {{form|crispy}}
                </div>

                <div class="mt-8 pt-6 border-t border-slate-100 flex gap-4">
                    <button type="submit" class="flex-1 bg-purple-700 hover:bg-purple-800 text-white font-bold py-3 rounded-md transition">
                        Save Address
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
