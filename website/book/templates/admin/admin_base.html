<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | BookChor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }

        /* Custom scrollbar for a cleaner look */
        .scrollbar-hide::-webkit-scrollbar {
            display: none;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 overflow-hidden">

    {% include "admin/admin_header.html" %}

    <div class="flex h-[calc(100vh-65px)]">
        
        <aside class="w-64 bg-slate-900 text-slate-300 flex flex-col border-r border-slate-800 shrink-0">

            <nav class="flex-1 px-4 py-6 space-y-1 overflow-y-auto scrollbar-hide">
                <p class="text-[10px] font-bold text-slate-500 uppercase tracking-widest px-3 mb-4">Core</p>

                <a href="{% url 'dashboard' %}"
                    class="flex items-center px-3 py-2.5 text-sm font-medium rounded-md transition-all 
                    {% if request.resolver_match.url_name == 'dashboard' %} bg-purple-600 text-white shadow-lg shadow-purple-900/20 {% else %} hover:bg-slate-800 hover:text-white {% endif %}">
                    Dashboard
                </a>

                <a href="{% url "admin_manage_genere" %}"
                    class="flex items-center px-3 py-2.5 text-sm font-medium rounded-md transition-all
                    {% if request.resolver_match.url_name == 'admin_manage_genere' %} bg-purple-600 text-white shadow-lg shadow-purple-900/20 {% else %} hover:bg-slate-800 hover:text-white {% endif %}">
                    Manage Genres
                </a>

                <a href="{% url "admin_manage_book" %}"
                    class="flex items-center px-3 py-2.5 text-sm font-medium rounded-md transition-all
                    {% if request.resolver_match.url_name == 'admin_manage_book' %} bg-purple-600 text-white shadow-lg shadow-purple-900/20 {% else %} hover:bg-slate-800 hover:text-white {% endif %}">
                    Manage Books
                </a>

                <a href="{% url 'admin_manage_author' %}"
                    class="flex items-center px-3 py-2.5 text-sm font-medium rounded-md transition-all 
                    {% if request.resolver_match.url_name == 'admin_manage_author' %} bg-purple-600 text-white shadow-lg shadow-purple-900/20 {% else %} hover:bg-slate-800 hover:text-white {% endif %}">
                    Manage Authors
                </a>

                <a href="{% url 'admin_manage_coupon' %}"
                    class="flex items-center px-3 py-2.5 text-sm font-medium rounded-md transition-all 
                    {% if request.resolver_match.url_name == 'admin_manage_coupon' %} bg-purple-600 text-white shadow-lg shadow-purple-900/20 {% else %} hover:bg-slate-800 hover:text-white {% endif %}">
                    Manage Coupons
                </a>

                <div class="pt-6 mt-6 border-t border-slate-800">
                    <p class="text-[10px] font-bold text-slate-500 uppercase tracking-widest px-3 mb-4">Business</p>
                    <a href="#" class="flex items-center px-3 py-2.5 text-sm font-medium rounded-md hover:bg-slate-800 hover:text-white transition-all">Users</a>
                    <a href="#" class="flex items-center px-3 py-2.5 text-sm font-medium rounded-md hover:bg-slate-800 hover:text-white transition-all">Orders</a>
                    <a href="#" class="flex items-center px-3 py-2.5 text-sm font-medium rounded-md hover:bg-slate-800 hover:text-white transition-all">Stocks</a>
                </div>
            </nav>

            <div class="p-4 bg-slate-900 border-t border-slate-800">
                <a href="{% url "admin_logout" %}"
                    class="flex items-center justify-center w-full px-4 py-2.5 text-sm font-bold text-red-400 bg-red-400/10 rounded-md hover:bg-red-500 hover:text-white transition-all">
                    Logout
                </a>
            </div>
        </aside>

        <main class="flex-1 overflow-y-auto bg-slate-50 scrollbar-hide">
            <div class="p-8">
                <div class="min-h-full">
                    {% block content %}
                    {% endblock %}
                </div>
            </div>
        </main>

    </div>

    {% include "footer.html" %}

</body>
</html>
