{% extends "admin/admin_base.html" %}
{% load crispy_forms_tags %}

{% block content %}
<div class="max-w-5xl mx-auto">
    <div class="mb-6">
        <a href="{% url 'admin_manage_coupon' %}" class="text-sm text-purple-700 hover:underline font-medium">
            ← Back to Coupons
        </a>
    </div>

    <div class="bg-white border border-slate-200 shadow-sm rounded-sm">
        <div class="p-6 border-b border-slate-200 bg-slate-50/30">
            <h2 class="font-bold text-xl text-slate-800">Insert New Coupon</h2>
            <p class="text-sm text-slate-500 font-medium">Add a new coupon to your promotional collection.</p>
        </div>
        
        <div class="p-8">
            <form action="" method="post" enctype="multipart/form-data">
                {% csrf_token %}
                
                <div class="space-y-6">
                    {{form|crispy}}
                </div>

                <div class="mt-10 pt-6 border-t border-slate-100 flex gap-4">
                    <button type="submit" class="flex-[2] bg-purple-700 hover:bg-purple-800 text-white font-bold py-3.5 rounded-md transition shadow-md shadow-purple-200">
                        Save Coupon
                    </button>
                    <a href="{% url 'admin_manage_coupon' %}" class="flex-1 bg-slate-100 hover:bg-slate-200 text-slate-700 font-bold py-3.5 rounded-md text-center transition">
                        Cancel
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
